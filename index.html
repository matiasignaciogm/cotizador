<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cotizador — Matías Gatica</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg:#fafaf9;--surface:#fff;--surface2:#f4f3f0;--border:rgba(0,0,0,.10);
    --border-med:rgba(0,0,0,.18);--text:#1a1a18;--text2:#6b6b66;--text3:#a0a09a;
    --accent-bg:#1a1a18;--accent-txt:#fff;--green:#2d6a4f;--green-bg:#d8f3e3;
    --amber:#92400e;--amber-bg:#fef3c7;--red:#991b1b;--red-bg:#fee2e2;
    --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141413;--surface:#1e1e1c;--surface2:#272725;--border:rgba(255,255,255,.10);
    --border-med:rgba(255,255,255,.18);--text:#f0efe8;--text2:#a0a09a;--text3:#686862;
    --accent-bg:#f0efe8;--accent-txt:#141413;--green:#6ee7b7;--green-bg:#064e3b;
    --amber:#fcd34d;--amber-bg:#451a03;--red:#fca5a5;--red-bg:#450a0a;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
  .shell{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .app-logo{font-size:16px;font-weight:600;letter-spacing:-.02em}
  .app-logo span{color:var(--text2);font-weight:400}
  .app-version{font-size:11px;color:var(--text3)}
  .tabs{display:flex;gap:2px;margin-bottom:1.75rem;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);width:fit-content}
  .tab{font-size:13px;padding:6px 18px;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:calc(var(--radius-sm) - 2px);transition:all .15s;font-weight:500;font-family:inherit}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
  .pane{display:none}.pane.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;box-shadow:var(--shadow)}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
  @media(max-width:600px){.grid3{grid-template-columns:1fr}}
  label.lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
  input[type=text],input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;transition:border-color .15s,box-shadow .15s;outline:none}
  input:focus{border-color:var(--border-med);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  .sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:1.5rem 0 .65rem}
  .quick-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem}
  .qtag{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--surface);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-family:inherit}
  .qtag:hover{background:var(--accent-bg);color:var(--accent-txt);border-color:var(--accent-bg)}
  .qtag.grp{background:none;border:none;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;cursor:default;padding:8px 2px 3px;width:100%;border-radius:0}
  .qtag.grp:hover{background:none;color:var(--text3)}
  .items-header{display:grid;grid-template-columns:2.5fr 110px 65px 100px 32px;gap:8px;padding:0 2px;margin-bottom:5px}
  .col-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
  .irow{display:grid;grid-template-columns:2.5fr 110px 65px 100px 32px;gap:8px;align-items:center;margin-bottom:6px}
  .irow input{font-size:13px;padding:6px 9px}
  .sub-cell{font-size:13px;font-weight:600;color:var(--text);text-align:right;padding-right:2px}
  .rm-btn{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:18px;line-height:1}
  .rm-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
  .divider{height:1px;background:var(--border);margin:1rem 0}
  .disc-row{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
  .disc-row label{font-size:13px;color:var(--text2);white-space:nowrap}
  .disc-row input{width:70px}
  .disc-hint{font-size:12px;color:var(--green);font-weight:500}
  .totals-block{max-width:320px;margin-left:auto}
  .t-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
  .t-row .tl{font-size:13px;color:var(--text2)}
  .t-row .tv{font-size:13px;font-weight:600;color:var(--text)}
  .t-row.disc .tv{color:var(--green)}
  .t-row.final{padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
  .t-row.final .tl{font-weight:600;color:var(--text);font-size:14px}
  .t-row.final .tv{font-size:17px}
  .btn{font-size:13px;padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-weight:500;border:1px solid var(--border-med);background:var(--surface);color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--surface2)}
  .btn.primary{background:var(--accent-bg);color:var(--accent-txt);border-color:var(--accent-bg)}
  .btn.primary:hover{opacity:.88}
  .btn.full{width:100%;justify-content:center;padding:11px 18px;font-size:14px;margin-top:1rem}
  .btn.sm{font-size:12px;padding:6px 13px}
  .btn.danger{color:var(--red);border-color:var(--red-bg);background:var(--red-bg)}
  .btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
  /* ── DOCUMENTO / PREVIEW ── fondo oscuro tipo template MG ── */
  --doc-bg:#1e1e1e;--doc-text:#f0efe8;--doc-text2:#aaa9a3;--doc-border:rgba(255,255,255,.15);
  .preview-wrap{margin-top:1.75rem}
  .preview-doc{background:var(--doc-bg);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:2.25rem;box-shadow:var(--shadow)}
  .pdoc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;gap:1rem}
  .pdoc-brand{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--doc-text)}
  .pdoc-sub{font-size:12px;color:var(--doc-text2);margin-top:4px}
  .pdoc-num{text-align:right}
  .pdoc-num .num{font-size:15px;font-weight:600;color:var(--doc-text)}
  .pdoc-num .meta{font-size:12px;color:var(--doc-text2);margin-top:3px}
  .pdoc-for{font-size:13px;color:var(--doc-text2);margin-bottom:1.25rem}
  .pdoc-for strong{color:var(--doc-text)}
  .ptable{width:100%;border-collapse:collapse;font-size:13px}
  .ptable th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--doc-text2);border-bottom:1px solid var(--doc-border);padding:6px 4px 6px 0;text-align:left}
  .ptable th:not(:first-child){text-align:right}
  .ptable td{padding:9px 4px 9px 0;border-bottom:1px solid var(--doc-border);color:var(--doc-text);vertical-align:middle}
  .ptable td:not(:first-child){text-align:right}
  .ptable tr:last-child td{border-bottom:none}
  .ptotals{margin-top:1rem;display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:260px;margin-left:auto}
  .pt-row{display:flex;gap:3rem;font-size:13px;width:100%;justify-content:flex-end}
  .pt-row .pl{color:var(--doc-text2)}
  .pt-row .pv{font-weight:600;min-width:110px;text-align:right;color:var(--doc-text)}
  .pt-row.pfinal{border-top:1px solid var(--doc-border);padding-top:7px;margin-top:4px}
  .pt-row.pfinal .pl{font-weight:600;color:var(--doc-text);font-size:14px}
  .pt-row.pfinal .pv{font-size:16px;color:var(--doc-text)}
  .pconds{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--doc-border)}
  .pconds p{font-size:12px;color:var(--doc-text2);margin-bottom:4px;line-height:1.55}
  .pconds strong{color:var(--doc-text)}
  .save-msg{font-size:12px;color:var(--green);margin-top:6px;display:none}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
  @media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow)}
  .stat-n{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em}
  .stat-l{font-size:11px;color:var(--text2);margin-top:3px}
  .hst-empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:13px}
  .hst-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:1rem;box-shadow:var(--shadow);transition:border-color .15s}
  .hst-item:hover{border-color:var(--border-med)}
  .hst-name{font-size:14px;font-weight:600;color:var(--text)}
  .hst-meta{font-size:12px;color:var(--text2);margin-top:3px}
  .hst-right{text-align:right;flex-shrink:0}
  .hst-amount{font-size:16px;font-weight:700;color:var(--text)}
  .hst-neto{font-size:11px;color:var(--text2);margin-top:2px}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .b-ok{background:var(--green-bg);color:var(--green)}
  .b-pend{background:var(--amber-bg);color:var(--amber)}
  .hst-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
  @media print{
    @page{size:A4;margin:0;background:#1e1e1e}
    html{background:#1e1e1e!important}
    html,body{background:#1e1e1e!important;color:#f0efe8!important;font-size:11pt;-webkit-print-color-adjust:exact;print-color-adjust:exact;margin:0;padding:0}
    .shell{max-width:100%;padding:1.5cm;background:#1e1e1e!important;min-height:100vh}
    .app-header,.tabs,.no-print{display:none!important}
    .pane{display:none!important}
    #pane-nueva{display:block!important;background:#1e1e1e!important}
    #pane-historial{display:none!important}
    #pane-nueva>*:not(.preview-wrap){display:none!important}
    .preview-wrap{display:block!important;margin:0;background:#1e1e1e!important}
    .preview-doc{border:none!important;box-shadow:none!important;padding:0!important;background:#1e1e1e!important;border-radius:0!important}
    .btn-row,.save-msg,.stat-grid,#hst-list{display:none!important}
    .pdoc-brand{font-size:18pt;color:#f0efe8!important}
    .pdoc-sub,.pdoc-for{color:#aaa9a3!important}
    .pdoc-for strong{color:#f0efe8!important}
    .ptable th{color:#aaa9a3!important;border-bottom:1pt solid rgba(255,255,255,.2)!important}
    .ptable td{color:#f0efe8!important;border-bottom:1pt solid rgba(255,255,255,.12)!important}
    .pt-row .pl{color:#aaa9a3!important}
    .pt-row .pv{color:#f0efe8!important}
    .pfinal .pl,.pfinal .pv{color:#f0efe8!important}
    .pt-row.pfinal{border-top:1pt solid rgba(255,255,255,.2)!important}
    .pconds{border-top:1pt solid rgba(255,255,255,.15)!important}
    .pconds p{color:#aaa9a3!important}
    .pconds strong{color:#f0efe8!important}
  }
</style>
</head>
<body>
<div class="shell">
  <header class="app-header">
    <div class="app-logo">Matías Gatica <span>— Cotizador</span></div>
    <div class="app-version">v2.0 · datos guardados localmente</div>
  </header>
  <div class="tabs no-print">
    <button class="tab active" onclick="switchTab('nueva')">Nueva cotización</button>
    <button class="tab" onclick="switchTab('historial')">Historial</button>
  </div>

  <div id="pane-nueva" class="pane active">
    <div class="grid3">
      <div class="card"><label class="lbl">Para (cliente / empresa)</label><input type="text" id="ic" placeholder="Nombre o empresa" /></div>
      <div class="card"><label class="lbl">Descripción del proyecto</label><input type="text" id="ip" placeholder="Ej: Aftermovie maratón Santiago" /></div>
      <div class="card"><label class="lbl">N° presupuesto</label>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="year-prefix" style="font-size:13px;color:var(--text2);white-space:nowrap;font-weight:500;padding:7px 0"></span>
          <input type="number" id="inum" placeholder="140" style="width:100%" min="1" />
        </div>
      </div>
    </div>
    <p class="sec">Ítems rápidos</p>
    <div class="quick-wrap" id="quick-tags"></div>
    <p class="sec">Ítems del presupuesto</p>
    <div class="items-header">
      <span class="col-hdr">Descripción</span>
      <span class="col-hdr">Tarifa unitaria</span>
      <span class="col-hdr">Cantidad</span>
      <span class="col-hdr" style="text-align:right">Subtotal</span>
      <span></span>
    </div>
    <div id="items-cont"></div>
    <button class="btn sm no-print" style="margin-top:4px" onclick="addItem('',0,1)">+ Agregar ítem</button>
    <div class="divider"></div>
    <div class="disc-row no-print">
      <label>Descuento</label>
      <input type="number" id="disc-pct" value="0" min="0" max="100" step="1" oninput="renderTotals()" style="width:70px" />
      <span style="font-size:13px;color:var(--text2)">%</span>
      <span class="disc-hint" id="disc-hint"></span>
    </div>
    <div class="totals-block">
      <div class="t-row"><span class="tl">Neto bruto</span><span class="tv" id="t-neto">$0</span></div>
      <div class="t-row disc" id="disc-row-el" style="display:none"><span class="tl">Descuento</span><span class="tv" id="t-disc">-$0</span></div>
      <div class="t-row"><span class="tl">Neto final</span><span class="tv" id="t-neto-final">$0</span></div>
      <div class="t-row"><span class="tl">IVA 19%</span><span class="tv" id="t-iva">$0</span></div>
      <div class="t-row final"><span class="tl">Total + IVA</span><span class="tv" id="t-total">$0</span></div>
    </div>
    <button class="btn primary full no-print" onclick="generatePreview()">Generar cotización →</button>
    <div class="preview-wrap" id="preview-wrap" style="display:none">
      <p class="sec no-print" style="margin-top:1.75rem">Vista previa</p>
      <div class="preview-doc" id="preview-doc"></div>
      <div class="btn-row no-print">
        <button class="btn primary sm" onclick="saveQuote()">Guardar en historial</button>
        <button class="btn sm" onclick="copyText()">Copiar texto</button>
        <button class="btn sm" onclick="printWithName()">Imprimir / PDF</button>
        <button class="btn sm" onclick="resetForm()">Nueva cotización</button>
      </div>
      <p class="save-msg" id="save-msg">✓ Guardada en historial</p>
    </div>
  </div>

  <div id="pane-historial" class="pane">
    <div class="stat-grid" id="stats-grid"></div>
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap" class="no-print">
      <button class="btn sm primary" onclick="exportCSV()">Exportar CSV</button>
      <button class="btn sm" onclick="exportJSON()">Exportar respaldo (.json)</button>
      <label class="btn sm" style="cursor:pointer;margin:0">
        Importar respaldo
        <input type="file" accept=".json" onchange="importJSON(event)" style="display:none" />
      </label>
    </div>
    <div id="hst-list"></div>
  </div>
</div>

<script>
const LS='mgpost_quotes_v2';
let items=[],iid=0,currentQuote=null;

// ── Firebase ──────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyACRmopx1jOxZyvKtjljeiUQLtkKDg6qTA",
  authDomain:"mgpost-cotizador.firebaseapp.com",
  projectId:"mgpost-cotizador",
  storageBucket:"mgpost-cotizador.firebasestorage.app",
  messagingSenderId:"803440454386",
  appId:"1:803440454386:web:72573a66ce2b9520027e6b"
};
let DOC=null;
try{
  firebase.initializeApp(firebaseConfig);
  const db=firebase.firestore();
  DOC=db.collection('mgpost').doc('cotizaciones');
}catch(e){
  console.warn('Firebase no disponible, modo offline:',e);
}

async function loadQ(){
  if(DOC){
    try{
      const snap=await DOC.get();
      if(snap.exists){
        const qs=snap.data().quotes||[];
        try{localStorage.setItem(LS,JSON.stringify(qs));}catch{}
        return qs;
      }
      const local=JSON.parse(localStorage.getItem(LS)||'[]');
      if(local.length){
        await DOC.set({quotes:local});
        console.log('Migración localStorage → Firebase completada');
      }
      return local;
    }catch(e){
      console.warn('Error Firebase, usando localStorage:',e);
    }
  }
  return JSON.parse(localStorage.getItem(LS)||'[]');
}

async function saveQ(qs){
  if(DOC){
    try{
      await DOC.set({quotes:qs});
      try{localStorage.setItem(LS,JSON.stringify(qs));}catch{}
      return;
    }catch(e){
      console.warn('Error Firebase, guardando en localStorage:',e);
    }
  }
  try{localStorage.setItem(LS,JSON.stringify(qs));}catch{}
}
const QUICK=[
  {grp:'Recaps y eventos'},
  {d:'Recap / Aftermovie 1 min',t:350000},
  {d:'Jornada edición en tiempo real',t:350000},
  {d:'Diseño sonoro y online',t:0},
  {grp:'Cápsulas'},
  {d:"Cápsula 20–30'",t:200000},
  {d:"Cápsula 30–40'",t:250000},
  {d:"Cápsula 40–60'",t:300000},
  {grp:'Montaje complejo'},
  {d:"Armado madre 30'",t:300000},
  {d:"Armado 20'",t:150000},
  {d:"Aftermovie 90'",t:400000},
  {d:"Recap interno 40'",t:300000},
  {grp:'Color y adaptaciones'},
  {d:'Color grading',t:350000},
  {d:'Adaptación de formato (9:16 / 4:5 / 1:1)',t:50000},
  {grp:'Extras'},
  {d:'Ítem personalizado',t:0},
];
const fmt=n=>'$'+Math.round(n).toLocaleString('es-CL');
const today=()=>new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'});
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='nueva')||(i===1&&t==='historial')));
  document.getElementById('pane-nueva').classList.toggle('active',t==='nueva');
  document.getElementById('pane-historial').classList.toggle('active',t==='historial');
  if(t==='historial')renderHistory();
}
function buildQ(){
  const w=document.getElementById('quick-tags');w.innerHTML='';
  QUICK.forEach(q=>{
    if(q.grp){const s=document.createElement('span');s.className='qtag grp';s.textContent=q.grp;w.appendChild(s);}
    else{const b=document.createElement('button');b.className='qtag';b.textContent=q.t?`${q.d} — ${fmt(q.t)}`:q.d;b.onclick=()=>addItem(q.d,q.t,1);w.appendChild(b);}
  });
}
function addItem(d,t,q){const id=++iid;items.push({id,desc:d||'',tarifa:t||0,qty:q||1});renderItems();}
function removeItem(id){items=items.filter(i=>i.id!==id);renderItems();}
function updateItem(id,f,v){
  const it=items.find(i=>i.id===id);if(!it)return;
  if(f==='d')it.desc=v;if(f==='t')it.tarifa=parseInt(v)||0;if(f==='q')it.qty=parseInt(v)||1;
  renderTotals();
}
function renderItems(){
  const c=document.getElementById('items-cont');c.innerHTML='';
  items.forEach(it=>{
    const row=document.createElement('div');row.className='irow';
    row.innerHTML=`
      <input type="text" value="${it.desc.replace(/"/g,'&quot;')}" placeholder="Descripción del ítem" oninput="updateItem(${it.id},'d',this.value)"/>
      <input type="number" value="${it.tarifa}" placeholder="0" step="50000" oninput="updateItem(${it.id},'t',this.value)"/>
      <input type="number" value="${it.qty}" min="1" oninput="updateItem(${it.id},'q',this.value)"/>
      <div class="sub-cell" id="sub-${it.id}">${fmt(it.tarifa*it.qty)}</div>
      <button class="rm-btn" onclick="removeItem(${it.id})" title="Eliminar">×</button>`;
    c.appendChild(row);
  });
  renderTotals();
}
function renderTotals(){
  items.forEach(it=>{const el=document.getElementById('sub-'+it.id);if(el)el.textContent=fmt(it.tarifa*it.qty);});
  const bruto=items.reduce((s,i)=>s+(i.tarifa*i.qty),0);
  const pct=parseFloat(document.getElementById('disc-pct').value)||0;
  const disc=Math.round(bruto*pct/100),neto=bruto-disc,iva=Math.round(neto*.19);
  document.getElementById('t-neto').textContent=fmt(bruto);
  document.getElementById('t-neto-final').textContent=fmt(neto);
  document.getElementById('t-iva').textContent=fmt(iva);
  document.getElementById('t-total').textContent=fmt(neto+iva);
  const dr=document.getElementById('disc-row-el'),dh=document.getElementById('disc-hint');
  if(pct>0){dr.style.display='flex';document.getElementById('t-disc').textContent=`-${fmt(disc)}`;dh.textContent=`(−${fmt(disc)})`;}
  else{dr.style.display='none';dh.textContent='';}
}
function generatePreview(){
  const cliente=document.getElementById('ic').value.trim()||'Cliente';
  const proyecto=document.getElementById('ip').value.trim();
  const year=new Date().getFullYear();
  const prefix=`${year}_`;
  const numeroInput=document.getElementById('inum').value.trim();
  const numero=numeroInput?`${prefix}${numeroInput}`:`${prefix}XXX`;
  const bruto=items.reduce((s,i)=>s+(i.tarifa*i.qty),0);
  const pct=parseFloat(document.getElementById('disc-pct').value)||0;
  const disc=Math.round(bruto*pct/100),neto=bruto-disc,iva=Math.round(neto*.19),total=neto+iva;
  currentQuote={cliente,proyecto,numero,items:JSON.parse(JSON.stringify(items)),bruto,pct,discAmt:disc,neto,iva,total,fecha:today(),ts:Date.now(),estado:'pendiente'};
  const rows=items.map(i=>`<tr><td>${i.desc||'—'}</td><td>${fmt(i.tarifa)}</td><td style="text-align:center">${i.qty}</td><td>${fmt(i.tarifa*i.qty)}</td></tr>`).join('');
  const discRow=pct>0?`<tr><td>Descuento pago a tiempo (${pct}%)</td><td></td><td></td><td style="color:var(--green)">−${fmt(disc)}</td></tr>`:'';
  document.getElementById('preview-doc').innerHTML=`
    <div class="pdoc-hdr">
      <div><div class="pdoc-brand">Matías Gatica</div><div class="pdoc-sub">Editor &amp; Colorist · matiasgatica.com · hola@matiasgatica.com</div></div>
      <div class="pdoc-num"><div class="num">Presupuesto #${numero}</div><div class="meta">Fecha: ${today()}</div><div class="meta">Válido por 1 semana</div></div>
    </div>
    <div class="pdoc-for">Preparado para: <strong>${cliente}</strong>${proyecto?' · '+proyecto:''}</div>
    <table class="ptable">
      <thead><tr><th>Descripción</th><th style="text-align:right">Tarifa</th><th style="text-align:center">Cant.</th><th style="text-align:right">Subtotal</th></tr></thead>
      <tbody>${rows}${discRow}</tbody>
    </table>
    <div class="ptotals">
      ${pct>0?`<div class="pt-row"><span class="pl">Neto bruto</span><span class="pv">${fmt(bruto)}</span></div><div class="pt-row"><span class="pl">Descuento ${pct}%</span><span class="pv" style="color:var(--green)">−${fmt(disc)}</span></div>`:''}
      <div class="pt-row"><span class="pl">Neto</span><span class="pv">${fmt(neto)}</span></div>
      <div class="pt-row"><span class="pl">IVA 19%</span><span class="pv">${fmt(iva)}</span></div>
      <div class="pt-row pfinal"><span class="pl">Total + IVA</span><span class="pv" style="font-size:18px">${fmt(total)}</span></div>
    </div>
    <div class="pconds">
      <p><strong>Este presupuesto incluye:</strong> Montaje, Color, Diseño Sonoro y Online.</p>
      <p>Hasta 3 rondas de revisión con feedback consolidado en un documento.</p>
      <p>Cambios fuera del alcance original o posteriores a la aprobación final se cotizan aparte.</p>
      <p>Entrega final en formatos MP4 y PRORES 4444 XQ resolución 4K.</p>
      <p style="margin-top:8px"><strong>Cliente debe proporcionar:</strong> Material en disco SSD (se devuelve al finalizar). Alternativamente se puede usar enlace Smash para transferencia.</p>
      <p style="margin-top:8px"><strong>Forma de pago:</strong> 50% al inicio del proyecto, 50% contra entrega.</p>
      <p><strong>Términos:</strong> No incluye entrega de sesión o proyecto de DaVinci Resolve. Cotización válida por 1 semana desde su recepción.</p>
    </div>`;
  const pw=document.getElementById('preview-wrap');pw.style.display='block';
  document.getElementById('save-msg').style.display='none';
  pw.scrollIntoView({behavior:'smooth',block:'start'});
}
async function saveQuote(){
  if(!currentQuote)return;
  const qs=await loadQ(),idx=qs.findIndex(q=>q.numero===currentQuote.numero);
  if(idx>=0)qs[idx]=currentQuote;else qs.unshift(currentQuote);
  await saveQ(qs);
  const msg=document.getElementById('save-msg');msg.style.display='block';
  setTimeout(()=>msg.style.display='none',3000);
}
function copyText(){
  if(!currentQuote)return;
  const d=currentQuote;
  const lines=[`PRESUPUESTO #${d.numero} — ${d.fecha}`,`Para: ${d.cliente}${d.proyecto?' · '+d.proyecto:''}`,'',' ÍTEMS:',...d.items.map(i=>`  ${i.desc}  ×${i.qty}  ${fmt(i.tarifa*i.qty)}`),'',...(d.pct>0?[`Descuento ${d.pct}%: −${fmt(d.discAmt)}`]:[]),`Neto: ${fmt(d.neto)}`,`IVA 19%: ${fmt(d.iva)}`,`TOTAL + IVA: ${fmt(d.total)}`,'','Incluye: Montaje, Color, Diseño Sonoro y Online.','Hasta 3 rondas de revisión. Cambios adicionales se cotizan aparte.','Entrega: MP4 y PRORES 4444 XQ 4K. Pago: 50% inicio / 50% entrega. Válido 1 semana.'];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btns=document.querySelectorAll('.btn-row button'),b=btns[1],orig=b.textContent;
    b.textContent='✓ Copiado';setTimeout(()=>b.textContent=orig,2000);
  });
}
function resetForm(){
  document.getElementById('ic').value='';document.getElementById('ip').value='';
  document.getElementById('inum').value='';document.getElementById('disc-pct').value=0;
  items=[];iid=0;currentQuote=null;
  document.getElementById('items-cont').innerHTML='';
  document.getElementById('preview-wrap').style.display='none';
  renderTotals();addItem('',0,1);window.scrollTo({top:0,behavior:'smooth'});
}
async function renderHistory(){
  const list=document.getElementById('hst-list');
  list.innerHTML='<div class="hst-empty" style="padding:2rem">Cargando...</div>';
  const qs=await loadQ();
  const totalN=qs.reduce((s,q)=>s+(q.neto||0),0);
  const apr=qs.filter(q=>q.estado==='aprobada').length;
  const tick=qs.length?Math.round(totalN/qs.length):0;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-n">${qs.length}</div><div class="stat-l">Total cotizaciones</div></div>
    <div class="stat-card"><div class="stat-n">${fmt(totalN)}</div><div class="stat-l">Neto total cotizado</div></div>
    <div class="stat-card"><div class="stat-n">${apr}</div><div class="stat-l">Aprobadas</div></div>
    <div class="stat-card"><div class="stat-n">${fmt(tick)}</div><div class="stat-l">Ticket promedio</div></div>`;
  if(!qs.length){list.innerHTML='<div class="hst-empty">Aún no hay cotizaciones guardadas.<br>Genera y guarda una desde "Nueva cotización".</div>';return;}
  list.innerHTML=qs.map((q,i)=>`
    <div class="hst-item">
      <div style="flex:1;min-width:0">
        <div class="hst-name">${q.cliente}<span style="font-weight:400;color:var(--text2)"> — #${q.numero}</span><span class="badge ${q.estado==='aprobada'?'b-ok':'b-pend'}">${q.estado}</span></div>
        <div class="hst-meta">${q.fecha}${q.proyecto?' · '+q.proyecto:''}</div>
      </div>
      <div class="hst-right"><div class="hst-amount">${fmt(q.total)}</div><div class="hst-neto">neto ${fmt(q.neto)}</div></div>
      <div class="hst-actions">
        <button class="btn sm" onclick="loadIntoEditor(${i})" style="font-size:11px;padding:5px 10px;background:var(--surface2)">Editar</button>
        <button class="btn sm" onclick="toggleE(${i})" style="font-size:11px;padding:5px 10px">${q.estado==='aprobada'?'Marcar pendiente':'Marcar aprobada'}</button>
        <button class="btn sm danger" onclick="delQ(${i})" title="Eliminar">×</button>
      </div>
    </div>`).join('');}
async function loadIntoEditor(idx){
  const qs=await loadQ();
  const q=qs[idx];
  if(!q)return;
  items=[];iid=0;currentQuote=null;
  document.getElementById('items-cont').innerHTML='';
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('ic').value=q.cliente||'';
  document.getElementById('ip').value=q.proyecto||'';
  const numParts=(q.numero||'').split('_');
  document.getElementById('inum').value=numParts.length>1?numParts.slice(1).join('_'):q.numero||'';
  document.getElementById('disc-pct').value=q.pct||0;
  (q.items||[]).forEach(it=>addItem(it.desc,it.tarifa,it.qty));
  renderTotals();
  switchTab('nueva');
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{
    const msg=document.getElementById('save-msg');
    msg.textContent='✓ Cotización cargada — modifica y genera de nuevo';
    msg.style.display='block';
    setTimeout(()=>{msg.style.display='none';msg.textContent='✓ Guardada en historial';},3000);
  },300);
}
async function toggleE(idx){
  const qs=await loadQ();
  if(!qs[idx])return;
  qs[idx].estado=qs[idx].estado==='aprobada'?'pendiente':'aprobada';
  await saveQ(qs);renderHistory();
}
async function delQ(idx){
  if(!confirm('¿Eliminar esta cotización?'))return;
  const qs=await loadQ();qs.splice(idx,1);
  await saveQ(qs);renderHistory();
}

function download(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function exportCSV() {
  const qs = await loadQ();
  if (!qs.length) { alert('No hay cotizaciones guardadas aún.'); return; }
  const headers = ['N° Presupuesto','Cliente','Proyecto','Fecha','Estado','Neto bruto','Descuento %','Descuento $','Neto final','IVA','Total + IVA'];
  const rows = qs.map(q => [
    q.numero, q.cliente, q.proyecto || '',
    q.fecha, q.estado,
    q.bruto, q.pct || 0, q.discAmt || 0,
    q.neto, q.iva, q.total
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const date = new Date().toISOString().split('T')[0];
  download([headers.join(','), ...rows].join('\r\n'), `mgpost_cotizaciones_${date}.csv`, 'text/csv;charset=utf-8;');
}
async function exportJSON() {
  const qs = await loadQ();
  if (!qs.length) { alert('No hay cotizaciones guardadas aún.'); return; }
  const date = new Date().toISOString().split('T')[0];
  download(JSON.stringify(qs, null, 2), `mgpost_respaldo_${date}.json`, 'application/json');
}
async function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { alert('Archivo inválido.'); return; }
      const existing = await loadQ();
      const existingNums = new Set(existing.map(q => q.numero));
      const nuevas = imported.filter(q => !existingNums.has(q.numero));
      const merged = [...nuevas, ...existing];
      await saveQ(merged);
      renderHistory();
      alert(`✓ Importación exitosa.\n${nuevas.length} cotización(es) nueva(s) agregada(s).`);
    } catch { alert('Error al leer el archivo.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function printWithName(){
  if(currentQuote){
    const nombre=`Presupuesto ${currentQuote.numero} — ${currentQuote.cliente}`;
    document.title=nombre;
    window.print();
    setTimeout(()=>document.title='Cotizador — Matías Gatica',1000);
  } else {
    window.print();
  }
}
// Inicializar prefijo de año
document.getElementById('year-prefix').textContent=new Date().getFullYear()+'_';
buildQ();addItem('',0,1);renderTotals();
